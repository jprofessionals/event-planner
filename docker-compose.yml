services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-event_planner_db}
      POSTGRES_USER: ${DB_USERNAME:-event_planner}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-event_planner}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event_planner -d event_planner_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-event_planner_db}
      DB_USERNAME: ${DB_USERNAME:-event_planner}
      DB_PASSWORD: ${DB_PASSWORD:-event_planner}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
