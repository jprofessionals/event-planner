services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-meetdb}
      POSTGRES_USER: ${DB_USERNAME:-meet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-meet}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meet -d meetdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-meetdb}
      DB_USERNAME: ${DB_USERNAME:-meet}
      DB_PASSWORD: ${DB_PASSWORD:-meet}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
