name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PUBLIC_SHOPPING_LIST_API_URL: https://liste.jpro.dev

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - uses: gradle/actions/setup-gradle@v4

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      - name: Kotlin lint
        run: ./gradlew ktlintCheck
        working-directory: backend

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Frontend format check
        run: npm run format:check
        working-directory: frontend

      - name: Frontend type check
        run: npm run check
        working-directory: frontend

      - name: E2E lint
        run: npm run lint
        working-directory: e2e

      - name: E2E format check
        run: npm run format:check
        working-directory: e2e

      - name: E2E type check
        run: npm run check
        working-directory: e2e

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate JWT test keys
        run: |
          openssl genrsa -out src/main/resources/privateKey.pem 2048
          openssl rsa -in src/main/resources/privateKey.pem -pubout -out src/main/resources/publicKey.pem
        working-directory: backend

      - name: Run tests
        run: ./gradlew test
        working-directory: backend

      - name: Build JVM jar
        run: ./gradlew build -x test
        working-directory: backend

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/build/quarkus-app/
          retention-days: 1

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npx vitest run
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  e2e-test:
    name: E2E Tests
    needs: [lint, backend-test, frontend-test]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: event_planner_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend/build/quarkus-app/

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

      - name: Start backend
        run: |
          java \
            -Dquarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/event_planner_db \
            -Dquarkus.datasource.username=postgres \
            -Dquarkus.datasource.password=postgres \
            -Dquarkus.datasource.devservices.enabled=false \
            -Dquarkus.flyway.migrate-at-start=true \
            -jar backend/build/quarkus-app/quarkus-run.jar &
        env:
          CI: true

      - name: Wait for backend
        run: |
          timeout 60 bash -c 'until curl -so /dev/null http://localhost:8080/api/events; do sleep 1; done'

      - name: Install e2e dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Start frontend with API proxy
        run: |
          node e2e/ci-server.mjs frontend/build 4173 &
          timeout 10 bash -c 'until curl -so /dev/null http://localhost:4173; do sleep 1; done'

      - name: Run E2E tests
        run: npx playwright test
        working-directory: e2e
        env:
          CI: true
          FRONTEND_URL: http://localhost:4173

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/test-results/
          retention-days: 7

  build-native:
    name: Build & Push Native Image
    needs: [e2e-test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native image
        run: |
          docker build -f Dockerfile \
            -t ghcr.io/jprofessionals/event-planner:latest \
            -t ghcr.io/jprofessionals/event-planner:sha-${GITHUB_SHA::7} \
            .
        working-directory: backend

      - name: Push to GHCR
        run: |
          docker push ghcr.io/jprofessionals/event-planner:latest
          docker push ghcr.io/jprofessionals/event-planner:sha-${GITHUB_SHA::7}

  deploy:
    name: Deploy to Server
    needs: [build-native]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Checkout ansible-controll
        uses: actions/checkout@v4
        with:
          repository: jprofessionals/ansible-dev-vm-controll
          ssh-key: ${{ secrets.ANSIBLE_CONTROLL_DEPLOY_KEY }}
          path: ansible-controll
          persist-credentials: false

      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible

      - name: Extract DB password from vault
        run: |
          printf '%s\n' "${{ secrets.VAULT_PASSWORD }}" > /tmp/vault_pass
          chmod 600 /tmp/vault_pass
          DB_PASSWORD=$(ansible localhost -m debug \
            -a "msg={{ vault_event_planner_db_password }}" \
            -e "@ansible-controll/inventory/group_vars/all.yml" \
            --vault-password-file /tmp/vault_pass -c local 2>/dev/null \
            | grep '"msg"' | sed 's/.*"msg": "\(.*\)"/\1/')
          echo "::add-mask::$DB_PASSWORD"
          echo "DB_PASSWORD=$DB_PASSWORD" >> "$GITHUB_ENV"
          rm -f /tmp/vault_pass

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-build/

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ vars.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend files
        run: |
          rsync -avz --delete \
            frontend-build/ \
            deploy@${{ vars.VM_HOST }}:/home/deploy/event-planner/frontend/

      - name: Deploy JWT keys
        run: |
          ssh deploy@${{ vars.VM_HOST }} 'mkdir -p /home/deploy/event-planner/keys'
          echo "$JWT_PRIVATE_KEY" | ssh deploy@${{ vars.VM_HOST }} 'cat > /home/deploy/event-planner/keys/privateKey.pem'
          echo "$JWT_PUBLIC_KEY" | ssh deploy@${{ vars.VM_HOST }} 'cat > /home/deploy/event-planner/keys/publicKey.pem'
          ssh deploy@${{ vars.VM_HOST }} 'chmod 644 /home/deploy/event-planner/keys/*.pem'
        env:
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}

      - name: Deploy backend
        run: |
          ssh deploy@${{ vars.VM_HOST }} bash -s << DEPLOY_SCRIPT
            set -e

            echo "Logging in to GHCR..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "Pulling new image..."
            docker pull ghcr.io/jprofessionals/event-planner:latest

            echo "Stopping old container..."
            docker stop event-planner-backend 2>/dev/null || true
            docker rm event-planner-backend 2>/dev/null || true

            echo "Starting new container..."
            docker run -d \
              --name event-planner-backend \
              --network host \
              -v /home/deploy/event-planner/keys:/keys:ro \
              -e QUARKUS_HTTP_PORT=8090 \
              -e DB_URL=jdbc:postgresql://localhost:5432/event_planner_db \
              -e DB_USERNAME=event_planner \
              -e "DB_PASSWORD=$DB_PASSWORD" \
              -e CORS_ORIGINS=https://event.jpro.dev \
              -e JWT_PRIVATE_KEY_PATH=file:///keys/privateKey.pem \
              -e JWT_PUBLIC_KEY_PATH=file:///keys/publicKey.pem \
              --restart unless-stopped \
              ghcr.io/jprofessionals/event-planner:latest

            echo "Waiting for backend..."
            timeout 30 bash -c 'until curl -so /dev/null http://localhost:8090/api/events; do sleep 1; done'
            echo "Backend is healthy!"

            echo "Cleaning up old images..."
            docker image prune -f
          DEPLOY_SCRIPT
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}

      - name: Clean up
        if: always()
        run: |
          rm -f ~/.ssh/id_ed25519
          rm -rf ansible-controll
