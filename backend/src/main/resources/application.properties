# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# DevServices (dev and test - auto-starts PostgreSQL via Testcontainers)
quarkus.datasource.devservices.image-name=docker.io/library/postgres:17-alpine
%dev.quarkus.datasource.devservices.db-name=meetdb
%test.quarkus.datasource.devservices.db-name=meetdb_test

# Prod - explicit connection, no DevServices
%prod.quarkus.datasource.devservices.enabled=false
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}

# Jackson
quarkus.jackson.serialization-inclusion=non-null

# JWT
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.issuer=meet-app
smallrye.jwt.new-token.issuer=meet-app

# Allow unauthenticated access to most endpoints (auth is optional for many)
quarkus.http.auth.permission.public.paths=/*
quarkus.http.auth.permission.public.policy=permit

# CORS
quarkus.http.cors=true
%dev.quarkus.http.cors.origins=http://localhost:5173,http://localhost:4173
%prod.quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000}
quarkus.http.cors.headers=accept,authorization,content-type,x-admin-token,x-participant-name
quarkus.http.cors.methods=GET,POST,PATCH,DELETE,OPTIONS

# Shopping List integration
shopping-list.api-url=${SHOPPING_LIST_API_URL:https://liste.jpro.dev}
%test.shopping-list.api-url=http://localhost:18089
